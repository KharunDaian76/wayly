name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Hard gate: fail the pipeline on invalid/missing critical configuration.
      - name: Validate backend environment
        working-directory: apps/api
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://wayly:wayly@localhost:5432/wayly
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: ci-access-secret-change-me
          JWT_REFRESH_SECRET: ci-refresh-secret-change-me
        run: pnpm check:env

      - name: Generate Prisma client
        run: pnpm --filter @wayly/api exec prisma generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
